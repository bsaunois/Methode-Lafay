<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0c">
<title>LAFAY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#232323;--border:#2c2c2c;--accent:#f97316;--a2:#fb923c;--adim:rgba(249,115,22,.11);--text:#ebebeb;--dim:#888;--ok:#22c55e;--err:#ef4444;--warn:#eab308;--info:#3b82f6;--tab:64px;--top:52px;--r:14px;--r2:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative}
.screen.active{display:flex}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab)+14px)}
.sa::-webkit-scrollbar{display:none}
/* TOP BAR */
.tb{height:var(--top);display:flex;align-items:center;padding:0 14px;gap:10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tb h1{font-size:20px;font-weight:900;letter-spacing:4px}
.tb .sp{flex:1}
.lv-pill{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;color:var(--dim);letter-spacing:1px}
.lv-pill b{color:var(--accent);font-size:14px;font-weight:900}
/* TAB BAR */
#tabbar{height:var(--tab);background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;z-index:20}
.tbn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--dim);cursor:pointer;transition:color .15s;padding-bottom:2px}
.tbn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tbn span{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.tbn.on{color:var(--accent)}
/* LAYOUT */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 14px 10px}
.card0{padding:0;overflow:hidden}
.slab{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding:14px 14px 6px}
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--r2);font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.bp{background:var(--accent);color:#000;font-size:16px;padding:14px 22px}.bp:active{background:var(--a2);transform:scale(.98)}
.bs{background:var(--s2);color:var(--text);font-size:14px;padding:11px 18px;border:1px solid var(--border)}.bs:active{background:var(--s3)}
.bg{background:transparent;color:var(--dim);font-size:13px;padding:8px 14px;border:none}
.be{background:var(--err);color:#fff;font-size:14px;padding:11px 18px}
.bw{width:100%}
.bsm{font-size:12px;padding:7px 12px;letter-spacing:1px}
/* STATS */
.stat-row{display:flex;gap:8px;margin:0 14px 10px}
.stat{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.stat .v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--accent);line-height:1.1}
.stat .l{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-top:3px}
/* EXO ROWS */
.er{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}
.eid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);min-width:20px;flex-shrink:0}
.ebody{flex:1;min-width:0}
.ename{font-size:15px;font-weight:700}
.esub{font-size:11px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ebadge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0;text-align:right}
.ecur{background:var(--adim);border-left:3px solid var(--accent)}
.edone{opacity:.4}
.edone .ename{text-decoration:line-through}
/* TOGGLE */
.tgl{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-t{position:absolute;inset:0;background:var(--s3);border-radius:12px;transition:background .2s}
.tgl input:checked+.tgl-t{background:var(--accent)}
.tgl-h{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.tgl input:checked~.tgl-h{transform:translateX(20px)}
/* CHIPS */
.chip{background:var(--s2);border:1px solid var(--border);padding:3px 9px;border-radius:16px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.cok{border-color:rgba(34,197,94,.3);color:var(--ok);background:rgba(34,197,94,.08)}
.cwn{border-color:rgba(234,179,8,.3);color:var(--warn);background:rgba(234,179,8,.08)}
.cac{border-color:rgba(249,115,22,.3);color:var(--accent);background:var(--adim)}
.cin{border-color:rgba(59,130,246,.3);color:var(--info);background:rgba(59,130,246,.08)}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;text-align:center}
.empty .ic{font-size:44px;opacity:.25;margin-bottom:4px}
.empty p{color:var(--dim);font-size:14px;max-width:220px;line-height:1.4}
/* ══ SESSION ══ */
.shdr{height:46px;display:flex;align-items:center;padding:0 14px;gap:10px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.shdr .lbl{flex:1;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shdr .el{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;flex-shrink:0}
.shdr .xb{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:var(--s2);border-radius:50%;color:var(--dim);cursor:pointer;font-size:16px;flex-shrink:0}
/* EXO CARD */
.cec{margin:10px 14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cec-top{padding:14px 16px;background:var(--adim);border-bottom:1px solid rgba(249,115,22,.18)}
.cec-info{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:5px}
.cec-name{font-size:26px;font-weight:900;letter-spacing:.5px;line-height:1.1}
.cec-ms{font-size:12px;color:var(--dim);margin-top:3px}
.cec-desc{padding:10px 16px;font-size:12px;color:var(--dim);line-height:1.45;border-bottom:1px solid var(--border)}
.cec-note{padding:8px 16px;font-size:12px;color:var(--accent);line-height:1.4;background:rgba(249,115,22,.05);font-weight:600}
/* REP CTR */
.rpw{margin:0 14px}
.rpt{padding:9px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2) var(--r2) 0 0;display:flex;align-items:center;gap:6px;border-bottom:none;flex-wrap:wrap}
.rpt .rl{flex:1;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.rpt .tg{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--warn)}
.rpt .pv{font-size:11px;font-weight:700;color:var(--info)}
.rpc{display:flex;align-items:center;background:var(--s1);border:1px solid var(--border);border-radius:0 0 var(--r2) var(--r2);overflow:hidden}
.rpb{width:58px;height:58px;display:flex;align-items:center;justify-content:center;border:none;background:var(--s2);font-size:24px;color:var(--text);cursor:pointer;flex-shrink:0;border-right:1px solid var(--border)}
.rpb:last-child{border-right:none;border-left:1px solid var(--border)}
.rpb:active{background:var(--s3)}
.rpv{flex:1;font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;text-align:center;line-height:58px}
.arow{display:flex;gap:8px;margin:10px 14px 0}
/* REST OVERLAY */
.rov{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(12,12,12,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:8px}
.rov.on{display:flex}
.rlbl{font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--dim)}
.rnxt{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.3px;text-align:center;padding:0 30px;margin-top:4px}
.rwrap{position:relative;width:170px;height:170px}
.rwrap svg{width:100%;height:100%}
.rdisp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;letter-spacing:-2px}
.rskip{margin-top:18px;background:var(--s2);border:1px solid var(--border);color:var(--dim);padding:10px 26px;border-radius:26px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.rskip:active{background:var(--s3)}
/* WARMUP */
.wu-phase{margin:10px 14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.wu-step{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.wu-step:last-child{border-bottom:none;padding-bottom:0}
.wu-n{width:28px;height:28px;border-radius:50%;background:var(--s3);color:var(--dim);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .2s,color .2s}
.wu-n.done{background:var(--ok);color:#000}
.wu-n.act{background:var(--accent);color:#000;animation:wupulse .7s ease-in-out infinite alternate}
@keyframes wupulse{from{box-shadow:0 0 0 0 rgba(249,115,22,.5)}to{box-shadow:0 0 0 8px rgba(249,115,22,0)}}
.wu-title{font-size:15px;font-weight:800;letter-spacing:.3px}
.wu-desc{font-size:12px;color:var(--dim);margin-top:4px;line-height:1.4}
/* COMPLETE */
.scw{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:28px 18px;text-align:center;gap:12px}
.scw .trophy{font-size:60px;line-height:1;margin-bottom:4px}
.scw h2{font-size:30px;font-weight:900;letter-spacing:3px}
.scw .sub{color:var(--dim);font-size:15px;max-width:260px}
.feel-row{display:flex;gap:8px}
.feel-btn{width:50px;height:50px;border:2px solid var(--border);border-radius:50%;background:var(--s1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.feel-btn.on{border-color:var(--accent);background:var(--adim);transform:scale(1.1)}
/* TARGET EDITOR */
.tgt-box{margin:0 14px 10px;background:var(--s1);border:1px solid rgba(249,115,22,.3);border-radius:var(--r);padding:14px}
.tgt-box .tt{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.tgt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tgt-row:last-child{margin-bottom:0}
.tgt-lbl{font-size:13px;font-weight:700;min-width:28px}
.tgt-inputs{flex:1;display:flex;gap:4px;flex-wrap:wrap}
.tgt-inp{width:40px;height:32px;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:center;-webkit-appearance:none}
.tgt-inp:focus{outline:none;border-color:var(--accent)}
/* ══ PROGRAMME ══ */
.lv-hero{margin:14px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lvh-top{padding:18px 16px 14px;background:linear-gradient(140deg,var(--adim) 0%,transparent 70%);border-bottom:1px solid var(--border)}
.lvh-top .n{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.lvh-top h2{font-size:24px;font-weight:900;letter-spacing:.5px;margin-bottom:5px}
.lvh-top p{font-size:13px;color:var(--dim);line-height:1.4}
.lvh-bot{padding:12px 16px;display:flex;gap:6px;flex-wrap:wrap}
/* CALENDAR */
.wcal{margin:0 14px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.wch{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.wch h3{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;flex:1}
.wch span{font-size:11px;color:var(--dim)}
.wtabs{display:flex;padding:0 14px;border-bottom:1px solid var(--border)}
.wtab{flex:1;text-align:center;padding:7px 0;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.wtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.week-row{display:flex;gap:3px;padding:12px 14px 8px}
.dc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.dc .dn{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.ddot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--dim)}
.ddot.train{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.ddot.done{border-color:var(--ok);color:#000;background:var(--ok);font-size:12px}
.ddot.today{border-color:var(--text);color:var(--text)}
.ddot.train.today{box-shadow:0 0 0 3px rgba(249,115,22,.25)}
.promo-box{margin:0 14px 10px;border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.04);border-radius:var(--r);padding:12px 14px}
.promo-box .pt{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.promo-box p{font-size:13px;color:var(--dim);line-height:1.4}
/* PROG DETAIL ROW */
.pdr{display:flex;flex-direction:column;gap:5px;padding:12px 14px;border-bottom:1px solid var(--border)}
.pdr:last-child{border-bottom:none}
.pdr-top{display:flex;align-items:center;gap:8px}
.pdr-idx{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);min-width:18px;flex-shrink:0}
.pdr-name{flex:1;font-size:14px;font-weight:800}
.pdr-sets{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent)}
.pdr-meta{display:flex;gap:4px;padding-left:26px;flex-wrap:wrap}
.pdr-prev{padding-left:26px;display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.pset{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
/* ══ SOUPLESSE ══ */
.szone{margin:0 14px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.szh{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s;border-bottom:1px solid transparent}
.szh:active{background:var(--s2)}
.szh .ic{font-size:18px}
.szh h3{font-size:14px;font-weight:800;flex:1}
.szh .cnt{font-size:11px;color:var(--dim);font-weight:600}
.szh .chv{font-size:13px;color:var(--dim);transition:transform .25s;flex-shrink:0}
.szh.open{border-bottom-color:var(--border)}
.szh.open .chv{transform:rotate(180deg)}
.szb{display:none}
.szh.open+.szb{display:block}
.sti{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.sti:last-child{border-bottom:none}
.stn{width:24px;height:24px;border-radius:6px;background:var(--accent);color:#000;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.stb{flex:1}
.sttitle{font-size:13px;font-weight:700;margin-bottom:4px}
.stdesc{font-size:12px;color:var(--dim);line-height:1.4}
.stfoot{margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stbtn{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;cursor:pointer}
.stbtn:active{background:var(--a2)}
.zone-tag{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.zt-h{background:rgba(59,130,246,.12);color:var(--info)}
.zt-m{background:rgba(249,115,22,.12);color:var(--accent)}
.zt-b{background:rgba(34,197,94,.12);color:var(--ok)}
/* Stretch active */
.ast{margin:0 14px 12px;background:var(--adim);border:1px solid rgba(249,115,22,.35);border-radius:var(--r);padding:14px;position:relative}
.ast .an{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.ast .at{font-size:16px;font-weight:800;margin-bottom:10px}
.ast-ctl{display:flex;align-items:center;gap:10px}
.ast-play{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ast-play:active{background:var(--a2)}
.ast-ring{width:44px;height:44px;flex-shrink:0}
.ast-ring svg{width:100%;height:100%}
.ast-time{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700}
.ast-hint{flex:1;font-size:11px;color:var(--dim);line-height:1.4}
.ast-close{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1}
/* ══ MOI ══ */
.si{margin:0 14px 8px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer}
.si-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px}
.si-date{display:flex;flex-direction:column;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;min-width:38px;flex-shrink:0}
.si-date .d{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;line-height:1;color:var(--accent)}
.si-date .m{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.si-info{flex:1;min-width:0}
.si-prog{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-meta{font-size:11px;color:var(--dim);margin-top:2px}
.si-feel{font-size:18px;flex-shrink:0}
.si-exp{max-height:0;overflow:hidden;transition:max-height .3s ease}
.si-exp.open{max-height:800px}
.si-inner{padding:0 14px 12px;border-top:1px solid var(--border)}
.mr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.mr:last-child{border-bottom:none}
.mr-id{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);min-width:24px}
.mr-nm{flex:1;font-size:12px}
.mr-rp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim)}
.trr{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border)}
.trr:last-child{border-bottom:none}
.trl{flex:1}
.trl .main{font-size:15px;font-weight:700}
.trl .sub{font-size:11px;color:var(--dim);margin-top:2px}
.lvo{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.lvo:last-child{border-bottom:none}
.lvo:active{background:var(--s2)}
.lvo .n{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);min-width:22px}
.lvo .i{flex:1}
.lvo .i .na{font-size:13px;font-weight:700}

{n:11,z:"h",title:"Flexion de la nuque allongé",desc:"Allongé au sol, entrecroisez les doigts et saisissez votre nuque. Ramenez progressivement la tête vers l'avant jusqu'à sentir une tension agréable. Ne forcez jamais.",dur:20},
{n:12,z:"h",title:"Étirement dos avec paumes jointes",desc:"Reprenez la position n°4 (paumes jointes dans le dos). Penchez-vous en avant avec l'intention de poser la poitrine sur la cuisse. Faites les deux côtés.",dur:30},
{n:13,z:"h",title:"Rotation du buste assis",desc:"Assis au sol, jambe D tendue, jambe G pliée pied contre genou D. Coude D contre genou G, main G derrière. Tournez le buste. Faites les deux côtés.",dur:30},
{n:14,z:"h",title:"Étirement des poignets à 4 pattes",desc:"À quatre pattes, tournez les poignets pour que les doigts pointent vers vos genoux. Reculez le bassin en pliant les jambes pour ressentir l'étirement dans les avant-bras.",dur:20},
{n:15,z:"h",title:"Flexion des poignets",desc:"Appuyez le coude D sur la cuisse, saisissez le dessus de la main D avec la main G. Exercez une pression modérée. Faites les deux côtés.",dur:20},
// MILIEU DU CORPS
{n:16,z:"m",title:"Genou vers la poitrine allongé",desc:"Allongé sur le dos, saisissez votre genou D à deux mains, tirez-le vers la poitrine, l'autre jambe tendue. Faites ensuite avec le genou G.",dur:30},
{n:17,z:"m",title:"Étirement des ischio-jambiers assis",desc:"Assis, jambe D tendue, jambe G repliée. Penchez-vous en avant, progressez le long de la jambe tendue. Objectif : poser la poitrine sur la cuisse. Faites les deux côtés.",dur:30},
{n:18,z:"m",title:"Étirement de la hanche pliée allongé",desc:"Variante du n°17 en position allongée sur le côté. Pliez une jambe en arrière pour aussi sentir l'étirement de la hanche du côté de la jambe pliée.",dur:30},
{n:19,z:"m",title:"Flexion avant jambes légèrement pliées",desc:"Debout, jambes légèrement pliées. Penchez-vous en avant pour toucher le sol avec les doigts puis la paume à plat. Sentez l'étirement dans le bas du dos et l'arrière des cuisses.",dur:30},
{n:20,z:"m",title:"Flexion avant avec inclinaison latérale",desc:"Variante du n°19 : au lieu de se pencher vers l'avant, penchez-vous alternativement sur le côté droit et sur le côté gauche.",dur:30},
{n:21,z:"m",title:"Flexion avant en tailleur",desc:"En tailleur, penchez-vous en avant. Objectif progressif : coudes au sol, puis front au sol. Gardez toujours les fesses au sol. Ne forcez jamais.",dur:30},
{n:22,z:"m",title:"Fente avant — étirement du psoas",desc:"Genou arrière au sol (protection sous le genou si besoin). Avancez le bassin en pliant la jambe avant. Le bassin doit avancer ET s'abaisser simultanément. Dos droit. Faites les deux côtés.",dur:30},
{n:23,z:"m",title:"Grand écart avant progressif",desc:"Depuis la fente, avancez progressivement le pied avant jusqu'à ce que l'étirement devienne légèrement douloureux. Alternez jambe D et G en avant. Utilisez des chaises pour vous soutenir.",dur:30},
{n:24,z:"m",title:"Jambes écartées allongé sur le dos",desc:"Couché sur le dos, attrapez chaque genou pour aider vos jambes à s'écarter. Le bas du dos doit rester collé au sol. Ne creusez pas les reins.",dur:30},
{n:25,z:"m",title:"Grand écart latéral progressif",desc:"Debout, penchez-vous en avant, posez les paumes à plat sur le sol, écartez les jambes jusqu'à ressentir l'étirement à l'intérieur des cuisses. Sol lisse recommandé.",dur:30},
{n:26,z:"m",title:"Étirement aine assis sur chaise",desc:"Assis sur le bord d'une chaise, jambes et pieds très écartés. Bras croisés, penchez-vous en avant, essayez de poser les coudes au sol.",dur:30},
{n:27,z:"m",title:"Fessier profond en position repliée",desc:"Comme n°18. Cette fois, essayez de poser les COUDES au sol. Commencez par les mains, progressez séance après séance.",dur:30},
{n:28,z:"m",title:"Étirement des genoux à quatre pattes",desc:"À genoux sur sol lisse. Écartez presque au maximum les cuisses. Coudes au sol, poussez les fesses vers l'arrière comme pour s'asseoir entre les mollets. Mollets parallèles.",dur:30},
{n:29,z:"m",title:"Rotation de la colonne vertébrale",desc:"Allongé sur le dos, pliez une jambe et laissez le genou descendre de l'autre côté, épaules collées au sol. Rotation vertébrale. Les deux côtés.",dur:30},
// BAS DU CORPS
{n:30,z:"b",title:"Quadriceps allongé sur le côté",desc:"Couché sur le côté, une jambe tendue. L'autre pliée avec le pied dans le prolongement du mollet (doigts vers l'arrière). Penchez-vous progressivement en arrière pour étirer l'avant de la cuisse.",dur:30},
{n:31,z:"b",title:"Seiza stretch — assis entre les mollets",desc:"À genoux, jambes écartées pour vous asseoir entre vos mollets. Penchez-vous en arrière. Objectif final : se coucher sur le dos, reins collés au sol. Progressez par étapes.",dur:30},
{n:32,z:"b",title:"Fessier en figure 4 allongé",desc:"Couché sur le dos, pied D à plat contre un mur, mollet parallèle au sol. Cheville G sur la cuisse D côté genou. Poussez l'intérieur du genou G vers le mur. Faites les deux côtés.",dur:30},
{n:33,z:"b",title:"Mollet et tendon d'Achille à 4 pattes",desc:"À quatre pattes, relevez légèrement un talon. Penchez-vous en avant sans décoller davantage le talon. Essayez de poser le talon au sol. Faites les deux côtés.",dur:20},
{n:34,z:"b",title:"Étirement du mollet sur cale",desc:"Avant-pied sur cale ou marche d'escalier. Poussez les talons vers le bas comme si vos orteils voulaient toucher le tibia. Ressentez l'étirement dans le mollet.",dur:30},
{n:35,z:"b",title:"Étirement du dessus du pied",desc:"Debout, posez le dessus du pied au sol (orteils vers l'arrière). Pesez légèrement. Très doux, ne jamais forcer. Pliez l'autre jambe si besoin.",dur:15},
];

const p2=n=>String(Math.max(0,n)).padStart(2,'0');
const fmtS=s=>{s=Math.max(0,Math.floor(s));return p2(Math.floor(s/60))+':'+p2(s%60)};
const feelE=f=>['','😤','😐','💪','🔥','🏆'][f]||'💪';
const rLbl=r=>({normal:'Normal',rapide:'Rapide',lent:'Lent',iso:'Iso'}[r]||r);
const dCol=d=>['','#22c55e','#3b82f6','#f97316','#ef4444'][d]||'#888';

const fDay=iso=>new Date(iso).getDate();
const fMon=iso=>new Date(iso).toLocaleDateString('fr-FR',{month:'short'}).toUpperCase();
const fDate=iso=>new Date(iso).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});

function getProfile(){return S.profile}
function getSessions(){return S.sessions}
function getActive(){return S.active}

function getCurProg(){
  const p=getProfile();if(!p)return null;
  const ids=LVL_PROGS[p.levelId]||[];if(!ids.length)return null;
  const sess=getSessions().filter(s=>s.levelId===p.levelId);
  return PROGS[ids[sess.length%ids.length]]||PROGS[ids[0]];
}

function getLastPerf(exoId){
  const ss=getSessions();
  for(const s of ss){
    if(!s.exercises)continue;
    const e=s.exercises.find(e=>e.exoId===exoId);
    if(e&&e.sets.length)return e.sets.map(s=>s.reps);
  }
  return null;
}

function getTarget(exoId,setCount){
  const t=S.targets[exoId];
  if(t&&Array.isArray(t))return t;
  const lp=getLastPerf(exoId);
  return lp||null;
}

// ═══════════════════════════════ TIMER ═══════════════════════════════
function startTimer(secs,cb){
  stopTimer();
  A.timerEnd=Date.now()+secs*1000;A.timerTotal=secs;
  updateTimerUI();
  A.timerTick=setInterval(()=>{
    const rem=(A.timerEnd-Date.now())/1000;
    if(rem<=0){stopTimer();beep();if(cb)cb();return;}
    updateTimerUI(rem);
  },100);
}
function stopTimer(){if(A.timerTick){clearInterval(A.timerTick);A.timerTick=null;}}
function updateTimerUI(rem){
  if(rem===undefined)rem=A.timerTotal;
  const prog=Math.max(0,rem/A.timerTotal);
  const el=document.getElementById('rd');const er=document.getElementById('rr');
  if(el)el.textContent=fmtS(rem);
  if(er)er.style.strokeDashoffset=314.159*(1-prog);
}
function showRest(msg){
  const ov=document.getElementById('rov');if(!ov)return;
  ov.classList.add('on');
  const nx=document.getElementById('rnxt');if(nx)nx.textContent=msg||'';
}
function hideRest(){const ov=document.getElementById('rov');if(ov)ov.classList.remove('on');stopTimer();A.timerEnd=null;}
function skipRest(){hideRest();renderActive();}

function beep(){
  try{
    navigator.vibrate&&navigator.vibrate([200,100,200]);
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [880,660,880].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t=ac.currentTime+i*.14;
      g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
      o.start(t);o.stop(t+.18);
    });
  }catch(e){}
}

function startElapsed(){
  if(A.elTick)clearInterval(A.elTick);
  A.elTick=setInterval(()=>{
    const el=document.getElementById('sel');
    if(el&&A.sessStart)el.textContent=fmtS((Date.now()-A.sessStart)/1000);
  },1000);
}
function stopElapsed(){if(A.elTick){clearInterval(A.elTick);A.elTick=null;}}

// ═══════════════════════════════ WARMUP ═══════════════════════════════
// Exactement comme page 21 du livre :
// 3 rounds de [cardio 15-30s + 10 reps exercice A]
// Si séance commence par B/B1/B2 → ajouter 1 série de B1
// Si séance commence par C/C1 → ajouter 1 série de C1
// Puis 2 min de repos
function buildWarmupSteps(){
  const prog=getCurProg();
  const firstExo=prog?prog.slots[0].exo:'';
  const steps=[
    {icon:'🏃',title:'Cardio — Round 1',desc:'15 à 30 secondes de saut à la corde, de sautillements sur place ou de l\'exercice E6. Objectif : s\'échauffer sans s\'épuiser.',dur:30,isCardio:true},
    {icon:'💪',title:'Exercice A — Round 1',desc:'10 répétitions de l\'exercice A (pompes classiques), sans chercher la performance. Arrêtez-vous avant la fatigue.',dur:0},
    {icon:'🏃',title:'Cardio — Round 2',desc:'15 à 30 secondes. Essayez de tenir un peu plus longtemps qu\'au 1er round.',dur:30,isCardio:true},
    {icon:'💪',title:'Exercice A — Round 2',desc:'10 répétitions de l\'exercice A. Reposez-vous tranquillement entre chaque enchaînement.',dur:0},
    {icon:'🏃',title:'Cardio — Round 3',desc:'15 à 30 secondes. Dernier round de cardio.',dur:30,isCardio:true},
    {icon:'💪',title:'Exercice A — Round 3',desc:'10 répétitions de l\'exercice A.',dur:0},
  ];
  if(['B','B1','B2'].includes(firstExo)){
    steps.push({icon:'🎯',title:'Échauffement spécifique : B1',desc:'1 série de B1 en vous arrêtant avant que ce soit difficile. Juste un échauffement, pas une performance. Puis 2 minutes de repos.',dur:0});
  } else if(['C','C1'].includes(firstExo)){
    steps.push({icon:'🎯',title:'Échauffement spécifique : C1',desc:'1 série de C1 en vous arrêtant avant la fatigue. Puis 2 minutes de repos.',dur:0});
  }
  steps.push({icon:'⏸',title:'Repos — 2 minutes',desc:'Reposez-vous 2 minutes avant de commencer votre séance de musculation.',dur:120,isRest:true});
  return steps;
}

function nextWuStep(){
  const steps=buildWarmupSteps();
  A.wuStep++;
  if(A.wuStep>=steps.length){A.phase='workout';A.wuStep=0;renderSeance();return;}
  const step=steps[A.wuStep];
  renderWuScreen(steps);
  if(step.isRest){
    startTimer(120,()=>{A.wuStep++;A.phase='workout';renderSeance();});
  } else if(step.isCardio&&step.dur>0){
    // Timer auto start for cardio steps
    startTimer(step.dur,()=>{beep();renderWuScreen(buildWarmupSteps());});
  }
}

function skipWu(){A.phase='workout';A.wuStep=0;renderSeance();}

// ═══════════════════════════════ SESSION ═══════════════════════════════
function startSession(){
  const prog=getCurProg();const p=getProfile();
  if(!prog||!p)return;
  const sess={
    id:uid(),date:new Date().toISOString(),levelId:p.levelId,programId:prog.id,
    startedAt:new Date().toISOString(),exoIdx:0,setNum:1,
    exercises:prog.slots.map(sl=>({exoId:sl.exo,sets:[]})),complete:false
  };
  S.active=sess;A.sessStart=Date.now();A.phase='warmup';A.wuStep=0;A.reps={};
  renderSeance();
}

function getSlot(){
  const sess=getActive();if(!sess)return null;
  const prog=PROGS[sess.programId];if(!prog)return null;
  return prog.slots[sess.exoIdx]||null;
}
function repKey(){const s=getActive();return s?`${s.exoIdx}_${s.setNum}`:'';}

function chReps(d){
  const k=repKey();const sl=getSlot();
  const def=sl?(sl.reps||0):0;
  const cur=A.reps[k]!==undefined?A.reps[k]:def;
  A.reps[k]=Math.max(0,cur+d);
  const el=document.getElementById('rpv');if(el)el.textContent=A.reps[k];
}

function confirmSet(){
  const sess=getActive();if(!sess)return;
  const prog=PROGS[sess.programId];if(!prog)return;
  const sl=prog.slots[sess.exoIdx];if(!sl)return;
  const k=repKey();
  const reps=A.reps[k]!==undefined?A.reps[k]:(sl.reps||0);
  sess.exercises[sess.exoIdx].sets.push({setNum:sess.setNum,reps});
  const totalSets=sl.sets||1;
  const lastSet=sess.setNum>=totalSets;
  const lastExo=sess.exoIdx>=prog.slots.length-1;

  if(lastSet){
    sess.exoIdx++;sess.setNum=1;S.active=sess;
    if(lastExo){
      if(sl.r2>0){showRest('🏁 Dernière série !');startTimer(sl.r2,()=>{hideRest();A.phase='complete';renderSeance();});}
      else{A.phase='complete';renderSeance();}
    } else {
      const rd=sl.r2||0;
      if(rd>0){
        const nx=EXO[prog.slots[sess.exoIdx].exo];
        showRest('Prochain : '+(nx?nx.name:prog.slots[sess.exoIdx].exo));
        startTimer(rd,()=>{hideRest();renderActive();});
      } else renderActive();
    }
  } else {
    sess.setNum++;S.active=sess;
    const rd=sl.r1||0;
    if(rd>0){
      const tgt=sl.reps?sl.reps+' reps':'max';
      showRest(`Série ${sess.setNum}/${totalSets} — objectif ${tgt}`);
      startTimer(rd,()=>{hideRest();renderActive();});
    } else renderActive();
  }
}

function saveSession(){
  const sess=getActive();if(!sess){A.phase='idle';renderSeance();return;}
  const dur=A.sessStart?Math.floor((Date.now()-A.sessStart)/1000):0;

  // Auto-update targets: suggest +1 rep on last sets where perf was met
  const prog=PROGS[sess.programId];
  if(prog){
    const newTargets={...S.targets};
    prog.slots.forEach(sl=>{
      const ex=sess.exercises.find(e=>e.exoId===sl.exo);
      if(!ex||!ex.sets.length)return;
      const repsArr=ex.sets.map(s=>s.reps);
      const lp=getLastPerf(sl.exo);
      const lpTotal=lp?lp.reduce((a,b)=>a+b,0):0;
      const curTotal=repsArr.reduce((a,b)=>a+b,0);
      // If improved, save as new target suggestion (same as achieved)
      if(curTotal>=lpTotal)newTargets[sl.exo]=repsArr;
    });
    S.targets=newTargets;
  }

  const saved={...sess,complete:true,endedAt:new Date().toISOString(),durationSeconds:dur,feeling:A.feeling};
  const ss=getSessions();ss.unshift(saved);S.sessions=ss;
  S.active=null;stopElapsed();A.phase='idle';A.sessStart=null;A.reps={};
  renderSeance();
}

function abandonSession(){
  if(!confirm('Abandonner la séance en cours ?'))return;
  stopTimer();stopElapsed();
  S.active=null;A.phase='idle';A.sessStart=null;A.reps={};
  hideRest();renderSeance();
}

function renderSeance(){
  const sc=document.getElementById('screen-seance');
  if(A.phase==='warmup'){renderWuScreen(buildWarmupSteps());if(!A.elTick)startElapsed();return;}
  if(A.phase==='workout'){renderActive();if(!A.elTick)startElapsed();return;}
  if(A.phase==='complete'){renderComplete();return;}
  renderIdle();
}

  let slotsHtml='';

    prog.slots.slice(0,6).forEach((sl,i)=>{
      const e=EXO[sl.exo];if(!e)return;

      const lpHtml=lp?`<div style="font-size:10px;color:var(--info);font-weight:600;margin-top:1px">Préc. : ${lp.join('·')} = ${lp.reduce((a,b)=>a+b,0)}</div>`:'';
      slotsHtml+=`<div class="er"><span class="eid">${i+1}</span><div class="ebody"><div class="ename">${e.name}</div><div class="esub">${e.ms.slice(0,2).join(' · ')}</div>${lpHtml}</div><span class="ebadge">${sl.sets}×${sl.reps||'∞'}<br><span style="font-size:10px;color:var(--dim)">${rLbl(sl.rh)}</span></span></div>`;
    });
    if(prog.slots.length>6)slotsHtml+=`<div style="padding:8px 14px;font-size:12px;color:var(--dim)">+${prog.slots.length-6} exercices de plus…</div>`;
  }

  const altIds=LVL_PROGS[p?.levelId]||[];
  const altTag=altIds.length>1&&prog?`<div style="font-size:10px;font-weight:800;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:2px">${prog.label}</div>`:'';

function renderProgramme(){
  const sc=document.getElementById('screen-programme');
  const p=getProfile();
  if(!p){sc.innerHTML=`<div class="tb"><h1>PROGRAMME</h1></div><div class="empty"><div class="ic">⚙️</div><p>Configure ton profil d'abord</p></div>`;return;}
  const lv=LVL[p.levelId];const prog=getCurProg();
  const progIds=LVL_PROGS[p.levelId]||[];
  const ss=getSessions();const levelSess=ss.filter(s=>s.levelId===p.levelId);

  // CALENDAR
  const sch=lv&&lv.schedule;
  const weekKeys=sch?Object.keys(sch):[];
  const cwk=Math.min(A.calWeek,weekKeys.length-1);
  const curSch=sch&&weekKeys[cwk]?sch[weekKeys[cwk]]:null;
  const trainDays=curSch?curSch.days:[];
  const today=new Date();const dow=today.getDay()||7;
  const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-(dow-1)+i);return d;});
  const dayNames=['L','M','Me','J','V','S','D'];

  const weekRow=dayNames.map((dn,i)=>{
    const isTrain=trainDays.includes(i+1);
    const isToday=weekDates[i].toDateString()===today.toDateString();
    const isDone=ss.some(s=>{const sd=new Date(s.date);return sd.toDateString()===weekDates[i].toDateString()&&s.levelId===p.levelId;});
    let cls='ddot';
    if(isTrain)cls+=' train';
    if(isDone)cls+=' done';
    if(isToday)cls+=' today';
    return`<div class="dc"><div class="dn">${dn}</div><div class="${cls}">${isDone?'✓':isToday&&isTrain?'•':''}</div></div>`;
  }).join('');

  const wtabs=weekKeys.length>1?`<div class="wtabs">${weekKeys.map((wk,i)=>`<div class="wtab ${i===cwk?'on':''}" onclick="A.calWeek=${i};renderProgramme()">${sch[wk].label.split(':')[0]}</div>`).join('')}</div>`:'';

  const calHtml=sch?`
    <div class="wcal">
      <div class="wch"><h3>Planning hebdo</h3><span>${levelSess.length} séances faites</span></div>
      ${wtabs}
      <div class="week-row">${weekRow}</div>
      <div style="padding:4px 14px 10px;font-size:12px;color:var(--dim)">${curSch?curSch.label:''}</div>
    </div>`:'';

  // ALT SESSIONS
  let altHtml='';
  if(progIds.length>1){
    altHtml=`<div class="slab">Séances alternées</div><div style="display:flex;gap:8px;margin:0 14px 10px">
      ${progIds.map((pid,i)=>{const pr=PROGS[pid];const cur=prog&&prog.id===pid;return`<div style="flex:1;background:${cur?'var(--adim)':'var(--s1)'};border:1px solid ${cur?'rgba(249,115,22,.4)':'var(--border)'};border-radius:10px;padding:10px 12px"><div style="font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:${cur?'var(--accent)':'var(--dim)'};margin-bottom:3px">SÉANCE ${i+1}${cur?' · PROCHAINE':''}</div><div style="font-size:12px;font-weight:700">${pr?pr.label:pid}</div><div style="font-size:11px;color:var(--dim);margin-top:2px">${pr?pr.slots.length+' exercices':''}</div></div>`;}).join('')}
    </div>`;
  }

  // PROG DETAIL
  let detailHtml='';
  if(prog){
    detailHtml=`<div class="slab">Exercices — ${prog.label}</div><div class="card card0">`;
    prog.slots.forEach((sl,i)=>{
      const e=EXO[sl.exo];if(!e)return;
      const lp=getLastPerf(sl.exo);
      const lpHtml=lp?`<div class="pdr-prev">${lp.map(r=>`<span class="pset">${r}</span>`).join('')}<span style="font-size:10px;color:var(--dim);align-self:center">= ${lp.reduce((a,b)=>a+b,0)}</span></div>`:'';
      detailHtml+=`<div class="pdr">
        <div class="pdr-top">
          <span class="pdr-idx">${i+1}</span>
          <div style="flex:1"><span class="pdr-name">${e.name}</span><span style="font-size:11px;color:var(--dim);margin-left:6px">${e.ms.slice(0,2).join(' · ')}</span></div>
          <span class="pdr-sets">${sl.sets}×${sl.reps||'∞'}</span>
        </div>
        <div class="pdr-meta">
          <span class="chip" style="font-size:9px">${rLbl(sl.rh)}</span>
          ${sl.r1>0?`<span class="chip" style="font-size:9px">⏱ ${fmtS(sl.r1)}</span>`:''}
          ${sl.r2>0?`<span class="chip" style="font-size:9px">⏸ ${fmtS(sl.r2)}</span>`:''}
          <span class="chip" style="font-size:9px;color:${dCol(e.d)}">${dLbl(e.d)}</span>
        </div>
        ${sl.note?`<div style="padding-left:26px;font-size:11px;color:var(--accent);line-height:1.4;font-weight:600;margin-top:2px">ℹ ${sl.note}</div>`:''}
        ${lpHtml}
      </div>`;
    });
    detailHtml+='</div>';
  }

  sc.innerHTML=`
    <div class="tb"><h1>PROGRAMME</h1><div class="sp"></div><button class="btn bs bsm" onclick="switchTab('moi')">Changer niveau</button></div>
    <div class="sa">
      <div class="lv-hero">
        <div class="lvh-top">
          <div class="n">NIVEAU ${lv?lv.num:'—'}</div>
          <h2>${lv?lv.label:'Non configuré'}</h2>
          <p>${lv?lv.desc:''}</p>
        </div>
        <div class="lvh-bot">
          <span class="chip cac">${lv?lv.freq:''}</span>
          ${lv&&lv.promo?`<span class="chip cwn">→ ${lv.promo.substring(0,35)}</span>`:''}
        </div>
      </div>
      ${calHtml}
      ${altHtml}
      ${lv&&lv.promo?`<div class="promo-box"><div class="pt">📈 Pour passer au niveau suivant</div><p>${lv.promo}</p></div>`:''}
      ${detailHtml}
    </div>`;
}

  const activeHtml=activeS?`
    <div class="ast">

      </div>`).join('');

        <div class="szh" onclick="this.classList.toggle('open')">

  sc.innerHTML=`

function startStretch(idx){
  if(A.stretchTick){clearInterval(A.stretchTick);A.stretchTick=null;}
  A.stretchIdx=idx;A.stretchEnd=null;A.stretchTotal=STRETCH[idx]?.dur||30;
  renderSouplesse();
}

function toggleStretchTimer(){
  if(A.stretchTick){clearInterval(A.stretchTick);A.stretchTick=null;renderSouplesse();return;}
  const s=STRETCH[A.stretchIdx];if(!s)return;
  const dur=s.dur||30;
  A.stretchTotal=dur;
  A.stretchEnd=Date.now()+dur*1000;
  A.stretchTick=setInterval(()=>{
    const rem=(A.stretchEnd-Date.now())/1000;
    const te=document.getElementById('ast-t');
    const tr=document.getElementById('ast-r');
    if(te)te.textContent=fmtS(rem);
    if(tr)tr.style.strokeDashoffset=94.248*(1-Math.max(0,rem)/dur);
    if(rem<=0){
      clearInterval(A.stretchTick);A.stretchTick=null;
      beep();
      A.stretchIdx=A.stretchIdx<STRETCH.length-1?A.stretchIdx+1:null;
      A.stretchEnd=null;
      renderSouplesse();
    }
  },200);
  renderSouplesse();
}

  const thisWk=ss.filter(s=>(Date.now()-new Date(s.date))/(86400000)<7).length;

  } else {
    ss.slice(0,20).forEach(s=>{
      const isExp=A.expandSess===s.id;
      const pr=PROGS[s.programId];
      const dur=s.durationSeconds?fmtS(s.durationSeconds):'—';
      const tr=s.exercises?s.exercises.reduce((a,e)=>a+e.sets.reduce((b,st)=>b+(st.reps||0),0),0):0;
      const expHtml=isExp&&s.exercises?`<div class="si-inner"><div style="margin-top:8px">${s.exercises.map(e=>{const ex=EXO[e.exoId];const rs=e.sets.map(st=>st.reps).join('·');const tot=e.sets.reduce((a,st)=>a+(st.reps||0),0);return`<div class="mr"><span class="mr-id">${e.exoId}</span><span class="mr-nm">${ex?ex.name:e.exoId}</span><span class="mr-rp">${rs} = ${tot}</span></div>`;}).join('')}</div></div>`:'';
      sessHtml+=`
        <div class="si" onclick="toggleSi('${s.id}')">
          <div class="si-hdr">
            <div class="si-date"><div class="d">${fDay(s.date)}</div><div class="m">${fMon(s.date)}</div></div>
            <div class="si-info"><div class="si-prog">${pr?pr.label:s.programId}</div><div class="si-meta">${dur} · ${tr} reps · ${fDate(s.date)}</div></div>
            <div class="si-feel">${feelE(s.feeling||3)}</div>
          </div>
          <div class="si-exp ${isExp?'open':''}">${expHtml}</div>
        </div>`;
    });
  }

  const lvHtml=LEVELS.map(l=>`
    <div class="lvo ${p.levelId===l.id?'sel':''}" onclick="selLevel('${l.id}')">
      <span class="n">${l.num}</span>
      <div class="i"><div class="na">${l.label}</div><div class="de">${l.short}</div></div>
      <div class="ck">${p.levelId===l.id?'✓':''}</div>
    </div>`).join('');

  sc.innerHTML=`
    <div class="tb"><h1>MOI</h1></div>
    <div class="sa">
      <div class="stat-row" style="margin-top:10px">
        <div class="stat"><div class="v">${ss.length}</div><div class="l">Séances</div></div>
        <div class="stat"><div class="v">${thisWk}</div><div class="l">Cette sem.</div></div>
        <div class="stat"><div class="v">${days}</div><div class="l">Jours</div></div>
        <div class="stat"><div class="v">${(totalR/1000).toFixed(1)}k</div><div class="l">Reps</div></div>
      </div>

      <div class="slab">Historique</div>
      ${sessHtml}

      <div class="slab">Équipement</div>
      <div class="card card0">
        <div class="trr"><div class="trl"><div class="main">🏋️ Barre de traction</div><div class="sub">Barre fixe, espalier, porte</div></div><label class="tgl"><input type="checkbox" ${p.hasBar?'checked':''} onchange="setEquip('bar',this.checked)"><span class="tgl-t"></span><span class="tgl-h"></span></label></div>
        <div class="trr"><div class="trl"><div class="main">🪑 Chaises disponibles</div><div class="sub">Chaises solides, tabourets</div></div><label class="tgl"><input type="checkbox" ${p.hasChairs!==false?'checked':''} onchange="setEquip('chairs',this.checked)"><span class="tgl-t"></span><span class="tgl-h"></span></label></div>
      </div>

      <div class="slab">Niveau actuel</div>
      <div class="card card0" style="max-height:380px;overflow-y:auto">${lvHtml}</div>

      <div class="slab">Zone danger</div>
      <div class="card">
        <p style="font-size:13px;color:var(--dim);line-height:1.4;margin-bottom:12px">Effacer tout l'historique. Irréversible.</p>
        <button class="btn be bsm" onclick="resetAll()">🗑 Effacer toutes les données</button>
      </div>
    </div>`;
}

function toggleSi(id){A.expandSess=A.expandSess===id?null:id;renderMoi();}
function setEquip(t,v){const p=getProfile()||{};if(t==='bar')p.hasBar=v;if(t==='chairs')p.hasChairs=v;S.profile=p;}
function selLevel(id){const p=getProfile()||{};p.levelId=id;S.profile=p;renderMoi();renderProgramme();}
function resetAll(){if(confirm('Effacer toutes les données ?')){'lf2_profile lf2_sessions lf2_active lf2_targets'.split(' ').forEach(k=>localStorage.removeItem(k));location.reload();}}

// ═══════════════════════════════ NAV ═══════════════════════════════
function switchTab(t){
  A.tab=t;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tbn').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+t).classList.add('active');
  document.querySelector(`.tbn[data-tab="${t}"]`).classList.add('on');
  renderTab(t);
}
function renderTab(t){
  if(t==='seance')renderSeance();
  else if(t==='programme')renderProgramme();
  else if(t==='souplesse')renderSouplesse();
  else if(t==='moi')renderMoi();
}

// ═══════════════════════════════ ONBOARDING ═══════════════════════════════
function obNext(){
  document.getElementById('ob1').classList.remove('on');
  document.getElementById('ob2').classList.add('on');
  buildObLvls();
}
function buildObLvls(){
  const el=document.getElementById('ob-lvls');if(!el)return;
  el.innerHTML=LEVELS.slice(0,10).map(l=>`
    <div class="lvo ${A.obLevel===l.id?'sel':''}" onclick="A.obLevel='${l.id}';buildObLvls()" style="padding:9px 12px">
      <span class="n" style="font-size:14px">${l.num}</span>
      <div class="i"><div class="na" style="font-size:13px">${l.label}</div><div class="de">${l.short}</div></div>
      <div class="ck">${A.obLevel===l.id?'✓':''}</div>
    </div>`).join('');
}
function obFinish(){
  S.profile={levelId:A.obLevel,hasBar:document.getElementById('ob-bar').checked,hasChairs:document.getElementById('ob-chairs').checked,startedAt:new Date().toISOString()};
  document.getElementById('ob').classList.remove('on');
  switchTab('seance');
}

// ═══════════════════════════════ BOOT ═══════════════════════════════
document.querySelectorAll('.tbn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
window.addEventListener('load',()=>{
  buildObLvls();
  const p=getProfile();
  if(p){
    document.getElementById('ob').classList.remove('on');
    const active=getActive();
    if(active){A.sessStart=Date.now()-((active.startedAt?Date.now()-new Date(active.startedAt).getTime():0));A.phase='workout';}
    switchTab('seance');
  } else {
    document.getElementById('ob').classList.add('on');
  }
});

</script>
</body>
</html>
